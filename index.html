<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Pick Calc">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Pick Calculator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f3; min-height: 100vh; color: #1a1a1a; }
.app { max-width: 480px; margin: 0 auto; padding: 0 0 80px 0; }
.header { background: #fff; border-bottom: 0.5px solid rgba(0,0,0,0.12); padding: 16px 20px 12px; position: sticky; top: 0; z-index: 10; }
.header h1 { font-size: 18px; font-weight: 500; letter-spacing: -0.3px; }
.header p { font-size: 12px; color: #666; margin-top: 2px; }
.tabs { display: flex; gap: 4px; padding: 12px 20px 0; }
.tab { flex: 1; padding: 8px; font-size: 13px; font-weight: 500; border: 0.5px solid rgba(0,0,0,0.25); border-radius: 8px; background: transparent; color: #666; cursor: pointer; transition: all 0.15s; }
.tab.active { background: #fff; color: #1a1a1a; border-color: rgba(0,0,0,0.4); }
.section { display: none; padding: 16px 20px; }
.section.active { display: block; }
.flabel { font-size: 12px; font-weight: 500; color: #666; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; display: block; }
.fgroup { margin-bottom: 12px; }
.fgroup input { width: 100%; height: 44px; padding: 0 12px; font-size: 16px; border: 0.5px solid rgba(0,0,0,0.25); border-radius: 8px; background: #fff; color: #1a1a1a; -webkit-appearance: none; }
.fgroup input:focus { outline: none; border-color: rgba(0,0,0,0.5); box-shadow: 0 0 0 2px rgba(0,0,0,0.06); }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.zone-sel { display: flex; gap: 6px; margin-bottom: 12px; }
.zbtn { flex: 1; height: 40px; font-size: 13px; font-weight: 500; border: 0.5px solid rgba(0,0,0,0.25); border-radius: 8px; background: transparent; cursor: pointer; color: #666; }
.zbtn.za { background: #FAEEDA; color: #854F0B; border-color: #EF9F27; }
.zbtn.zc { background: #E6F1FB; color: #185FA5; border-color: #378ADD; }
.zbtn.zf { background: #E1F5EE; color: #0F6E56; border-color: #1D9E75; }
.result-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 18px; margin: 12px 0; }
.result-split { display: grid; grid-template-columns: 1fr 0.5px 1fr; }
.result-divider { background: rgba(0,0,0,0.12); }
.result-col { text-align: center; padding: 0 12px; }
.rlabel { font-size: 11px; font-weight: 500; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.rvalue { font-size: 44px; font-weight: 500; color: #1a1a1a; letter-spacing: -2px; line-height: 1; }
.rsub { font-size: 12px; color: #666; margin-top: 6px; }
.rerr { font-size: 13px; color: #c0392b; font-style: italic; }
.delta-value { font-size: 44px; font-weight: 500; letter-spacing: -2px; line-height: 1; }
.delta-ok   { color: #888; }
.delta-warn { color: #BA7517; }
.delta-crit { color: #c0392b; }
.delta-sub { font-size: 12px; margin-top: 6px; }
.delta-sub.ok   { color: #888; }
.delta-sub.warn { color: #BA7517; }
.delta-sub.crit { color: #c0392b; }
.mgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.metric { background: #f0efe8; border-radius: 8px; padding: 10px; }
.mlabel { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 3px; }
.mval { font-size: 16px; font-weight: 500; color: #1a1a1a; }
.btnrow { display: flex; gap: 8px; margin-top: 4px; }
.btn { flex: 1; height: 44px; font-size: 14px; font-weight: 500; border: 0.5px solid rgba(0,0,0,0.25); border-radius: 8px; background: transparent; color: #1a1a1a; cursor: pointer; }
.btn:active { transform: scale(0.98); }
.btn.primary { background: #1a1a1a; color: #fff; border-color: transparent; }
.divider { border: none; border-top: 0.5px solid rgba(0,0,0,0.1); margin: 12px 0; }
.note-field { width: 100%; padding: 10px 12px; font-size: 14px; border: 0.5px solid rgba(0,0,0,0.25); border-radius: 8px; background: #fff; color: #1a1a1a; resize: none; height: 64px; font-family: inherit; margin-bottom: 10px; }
.note-field:focus { outline: none; border-color: rgba(0,0,0,0.5); }
.filter-bar { display: flex; gap: 6px; margin-bottom: 10px; }
.fbtn { flex: 1; height: 34px; font-size: 12px; font-weight: 500; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 8px; background: transparent; cursor: pointer; color: #666; }
.fbtn.fall { background: #1a1a1a; color: #fff; border-color: transparent; }
.fbtn.famb { background: #FAEEDA; color: #854F0B; border-color: #EF9F27; }
.fbtn.fchi { background: #E6F1FB; color: #185FA5; border-color: #378ADD; }
.fbtn.ffre { background: #E1F5EE; color: #0F6E56; border-color: #1D9E75; }
.zbadge { display: inline-block; font-size: 10px; font-weight: 500; padding: 1px 7px; border-radius: 5px; margin-left: 5px; }
.zbadge.ambient { background: #FAEEDA; color: #854F0B; }
.zbadge.chill   { background: #E6F1FB; color: #185FA5; }
.zbadge.freezer { background: #E1F5EE; color: #0F6E56; }
.hitem { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 8px; padding: 8px 10px; margin-bottom: 6px; }
.hhead { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.hdate { font-size: 11px; color: #666; }
.hgrid { display: grid; gap: 0; }
.hgrid-4 { grid-template-columns: repeat(4, 1fr); border-bottom: 0.5px solid rgba(0,0,0,0.1); padding-bottom: 5px; margin-bottom: 5px; }
.hgrid-3 { grid-template-columns: 1fr 1fr 2fr; border-bottom: 0.5px solid rgba(0,0,0,0.1); padding-bottom: 5px; margin-bottom: 5px; }
.hgrid-2 { grid-template-columns: repeat(2, 1fr); }
.hgcol { text-align: center; padding: 2px 2px; }
.hgcol + .hgcol { border-left: 0.5px solid rgba(0,0,0,0.1); }
.hglabel { font-size: 9px; color: #666; text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 1px; }
.hgval { font-size: 12px; font-weight: 500; color: #1a1a1a; }
.hgval.delta-ok   { color: #888; }
.hgval.delta-warn { color: #BA7517; }
.hgval.delta-crit { color: #c0392b; }
.hempty { text-align: center; padding: 40px 20px; color: #666; font-size: 14px; }
@media (prefers-color-scheme: dark) {
  body { background: #1a1a1a; color: #f0f0f0; }
  .header { background: #242424; border-color: rgba(255,255,255,0.1); }
  .header h1 { color: #f0f0f0; }
  .header p, .flabel { color: #999; }
  .tab { border-color: rgba(255,255,255,0.2); color: #999; }
  .tab.active { background: #2e2e2e; color: #f0f0f0; border-color: rgba(255,255,255,0.4); }
  .fgroup input { background: #242424; border-color: rgba(255,255,255,0.2); color: #f0f0f0; }
  .zbtn { border-color: rgba(255,255,255,0.2); color: #999; }
  .result-card { background: #242424; border-color: rgba(255,255,255,0.1); }
  .result-divider { background: rgba(255,255,255,0.1); }
  .rlabel, .rsub { color: #999; }
  .rvalue { color: #f0f0f0; }
  .delta-ok, .delta-sub.ok { color: #999; }
  .metric { background: #2a2a2a; }
  .mlabel { color: #999; }
  .mval { color: #f0f0f0; }
  .btn { border-color: rgba(255,255,255,0.2); color: #f0f0f0; }
  .btn.primary { background: #f0f0f0; color: #1a1a1a; }
  .fbtn { border-color: rgba(255,255,255,0.2); color: #999; }
  .fbtn.fall { background: #f0f0f0; color: #1a1a1a; }
  .note-field { background: #242424; border-color: rgba(255,255,255,0.2); color: #f0f0f0; }
  .hitem { background: #242424; border-color: rgba(255,255,255,0.1); }
  .hdate, .hglabel { color: #999; }
  .hgval { color: #f0f0f0; }
  .hgval.delta-ok { color: #999; }
  .hgcol + .hgcol { border-color: rgba(255,255,255,0.1); }
  .hgrid-4, .hgrid-3 { border-color: rgba(255,255,255,0.1); }
  .divider { border-color: rgba(255,255,255,0.1); }
  .hempty { color: #999; }
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Pick calculator</h1>
    <p>Workforce planning tool</p>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('calc')">Calculator</button>
    <button class="tab" onclick="switchTab('history')">History</button>
  </div>

  <div id="calc" class="section active">
    <label class="flabel">Zone</label>
    <div class="zone-sel">
      <button class="zbtn za" id="zone-ambient" onclick="setZone('ambient')">Ambient</button>
      <button class="zbtn" id="zone-chill" onclick="setZone('chill')">Chill</button>
      <button class="zbtn" id="zone-freezer" onclick="setZone('freezer')">Freezer</button>
    </div>
    <div class="row2">
      <div class="fgroup"><label class="flabel">Pick out time</label><input type="time" id="pickout" value="14:00"></div>
      <div class="fgroup"><label class="flabel">Current time</label><input type="time" id="currenttime"></div>
    </div>
    <div class="row2">
      <div class="fgroup"><label class="flabel">Breaks (mins)</label><input type="number" id="breaks" placeholder="0" min="0" inputmode="numeric"></div>
      <div class="fgroup"><label class="flabel">Remaining units</label><input type="number" id="units" placeholder="0" min="0" inputmode="numeric"></div>
    </div>
    <div class="row2">
      <div class="fgroup"><label class="flabel">OGRP %</label><input type="number" id="ogrp" placeholder="0" min="0" max="100" inputmode="numeric"></div>
      <div class="fgroup"><label class="flabel">UPH</label><input type="number" id="uph" placeholder="0" min="0" inputmode="numeric"></div>
    </div>
    <div class="fgroup"><label class="flabel">Active people</label><input type="number" id="activepeople" placeholder="0" min="0" inputmode="numeric"></div>

    <div class="result-card">
      <div class="result-split">
        <div class="result-col">
          <div class="rlabel">Calculated</div>
          <div class="rvalue" id="resultValue">—</div>
          <div class="rsub" id="resultSub"></div>
        </div>
        <div class="result-divider"></div>
        <div class="result-col">
          <div class="rlabel">Delta</div>
          <div class="delta-value delta-ok" id="deltaValue">—</div>
          <div class="delta-sub ok" id="deltaSub"></div>
        </div>
      </div>
    </div>

    <div class="mgrid" id="metricsGrid" style="display:none">
      <div class="metric"><div class="mlabel">Time remaining</div><div class="mval" id="mTime">—</div></div>
      <div class="metric"><div class="mlabel">Effective units</div><div class="mval" id="mUnits">—</div></div>
      <div class="metric"><div class="mlabel">Active people</div><div class="mval" id="mActive">—</div></div>
      <div class="metric"><div class="mlabel">People needed</div><div class="mval" id="mNeeded">—</div></div>
    </div>

    <hr class="divider">
    <textarea class="note-field" id="noteField" placeholder="Optional note..."></textarea>
    <div class="btnrow">
      <button class="btn" onclick="resetForm()">Clear</button>
      <button class="btn primary" onclick="saveRecord()">Save record</button>
    </div>
  </div>

  <div id="history" class="section">
    <div class="filter-bar">
      <button class="fbtn fall" id="filter-all" onclick="setFilter('all')">All</button>
      <button class="fbtn" id="filter-ambient" onclick="setFilter('ambient')">Ambient</button>
      <button class="fbtn" id="filter-chill" onclick="setFilter('chill')">Chill</button>
      <button class="fbtn" id="filter-freezer" onclick="setFilter('freezer')">Freezer</button>
    </div>
    <div id="historyList"></div>
  </div>
</div>

<script>
const ZONES = ['ambient','chill','freezer'];
const FIELDS = ['pickout','breaks','units','ogrp','uph','activepeople'];
let selectedZone = 'ambient';
let activeFilter = 'all';

function now() {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}
document.getElementById('currenttime').value = now();

function zKey(z) { return 'zoneState_'+z; }
function saveZoneState(z) {
  const s = {};
  FIELDS.forEach(id => s[id] = document.getElementById(id).value);
  localStorage.setItem(zKey(z), JSON.stringify(s));
}
function loadZoneState(z) {
  const raw = localStorage.getItem(zKey(z));
  if (!raw) return;
  const s = JSON.parse(raw);
  FIELDS.forEach(id => { if (s[id] !== undefined) document.getElementById(id).value = s[id]; });
}

function setZone(zone) {
  saveZoneState(selectedZone);
  selectedZone = zone;
  ZONES.forEach(z => {
    const cls = z==='ambient'?'za':z==='chill'?'zc':'zf';
    document.getElementById('zone-'+z).className = 'zbtn'+(z===zone?' '+cls:'');
  });
  loadZoneState(zone);
  calculate();
}

function setFilter(f) {
  activeFilter = f;
  ['all','ambient','chill','freezer'].forEach(x => {
    const cls = x==='all'?'fall':x==='ambient'?'famb':x==='chill'?'fchi':'ffre';
    document.getElementById('filter-'+x).className = 'fbtn'+(x===f?' '+cls:'');
  });
  renderHistory();
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active',(i===0&&tab==='calc')||(i===1&&tab==='history')));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  if (tab==='history') renderHistory();
}

function getVals() {
  const toMins = t => { if(!t) return null; const [h,m]=t.split(':').map(Number); return h*60+m; };
  return {
    pickout: toMins(document.getElementById('pickout').value),
    current: toMins(document.getElementById('currenttime').value),
    breaks: parseFloat(document.getElementById('breaks').value)||0,
    units: parseFloat(document.getElementById('units').value)||0,
    ogrp: parseFloat(document.getElementById('ogrp').value)||0,
    uph: parseFloat(document.getElementById('uph').value)||0,
    active: parseFloat(document.getElementById('activepeople').value)||0,
  };
}

function getDeltaInfo(delta) {
  if (delta === null) return { cls: 'ok',   label: '' };
  if (delta >= 4)     return { cls: 'crit', label: 'overstaffed' };
  if (delta >= 2)     return { cls: 'warn', label: 'overstaffed' };
  if (delta >= 0)     return { cls: 'ok',   label: 'on track' };
  if (delta >= -3)    return { cls: 'warn', label: 'short-staffed' };
  return                     { cls: 'crit', label: 'short-staffed' };
}

function formatDelta(delta) {
  if (delta === null) return '—';
  return (delta > 0 ? '+' : '') + delta;
}

function calculate() {
  const v = getVals();
  const rv = document.getElementById('resultValue');
  const rs = document.getElementById('resultSub');
  const dv = document.getElementById('deltaValue');
  const ds = document.getElementById('deltaSub');
  const mg = document.getElementById('metricsGrid');
  const clearDelta = () => { dv.textContent='—'; dv.className='delta-value delta-ok'; ds.textContent=''; ds.className='delta-sub ok'; };
  if (!v.pickout||!v.current) { rv.innerHTML='<span class="rerr">Enter times</span>'; clearDelta(); mg.style.display='none'; return null; }
  const rem = (v.pickout - v.current - v.breaks) / 60;
  if (rem<=0) { rv.innerHTML='<span class="rerr">No time remaining</span>'; clearDelta(); mg.style.display='none'; return null; }
  if (v.uph<=0) { rv.innerHTML='<span class="rerr">Enter UPH</span>'; clearDelta(); mg.style.display='none'; return null; }
  const eff = v.units - (v.units * v.ogrp / 100);
  const cp = (eff / v.uph) / rem;
  const cpCeil = Math.ceil(cp);
  rv.textContent = cp.toFixed(2);
  rs.textContent = '';
  const delta = v.active > 0 ? v.active - cpCeil : null;
  const info = getDeltaInfo(delta);
  dv.textContent = formatDelta(delta);
  dv.className = 'delta-value delta-'+info.cls;
  ds.textContent = info.label;
  ds.className = 'delta-sub '+info.cls;
  document.getElementById('mTime').textContent = rem.toFixed(2)+'h';
  document.getElementById('mUnits').textContent = Math.round(eff).toLocaleString();
  document.getElementById('mActive').textContent = v.active||'—';
  document.getElementById('mNeeded').textContent = cp.toFixed(2);
  mg.style.display = 'grid';
  return { rem, eff, cp, cpCeil, delta };
}

FIELDS.concat(['currenttime']).forEach(id => document.getElementById(id).addEventListener('input', calculate));
calculate();

function saveRecord() {
  const result = calculate();
  if (!result) { alert('Fix errors before saving.'); return; }
  const v = getVals();
  const records = JSON.parse(localStorage.getItem('pickRecords')||'[]');
  const toTime = m => { if(!m) return '—'; return Math.floor(m/60).toString().padStart(2,'0')+':'+String(m%60).padStart(2,'0'); };
  records.unshift({
    id: Date.now(),
    savedAt: new Date().toLocaleString('en-AU',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}),
    savedDate: new Date().toLocaleString('en-AU',{day:'2-digit',month:'2-digit',year:'numeric'}),
    zone: selectedZone,
    pickout: toTime(v.pickout),
    current: toTime(v.current),
    breaks: v.breaks, units: v.units, ogrp: v.ogrp, uph: v.uph, active: v.active,
    timeRemH: result.rem, effectiveUnits: result.eff, calcPeople: result.cp,
    delta: result.delta,
    note: document.getElementById('noteField').value.trim(),
  });
  localStorage.setItem('pickRecords', JSON.stringify(records));
  saveZoneState(selectedZone);
  document.getElementById('noteField').value = '';
  switchTab('history');
}

function resetForm() {
  FIELDS.forEach(id => document.getElementById(id).value = id==='pickout'?'14:00':'');
  document.getElementById('currenttime').value = now();
  document.getElementById('noteField').value = '';
  localStorage.removeItem(zKey(selectedZone));
  calculate();
}

function deleteRecord(id) {
  if (!confirm('Delete this record?')) return;
  const records = JSON.parse(localStorage.getItem('pickRecords')||'[]').filter(r => r.id!==id);
  localStorage.setItem('pickRecords', JSON.stringify(records));
  renderHistory();
}

function renderHistory() {
  let records = JSON.parse(localStorage.getItem('pickRecords')||'[]');
  if (activeFilter!=='all') records = records.filter(r => (r.zone||'ambient')===activeFilter);
  const toSortKey = r => {
    const ds = r.savedAt.replace(/(\d{2})\/(\d{2})\/(\d{4}),?\s*/,'$3-$2-$1 ');
    return ds + (r.current||'00:00');
  };
  records.sort((a,b) => toSortKey(b).localeCompare(toSortKey(a)));
  const el = document.getElementById('historyList');
  if (!records.length) {
    el.innerHTML = '<div class="hempty">No saved records'+(activeFilter!=='all'?' for '+activeFilter:'')+'.</div>';
    return;
  }
  el.innerHTML = records.map(r => {
    const zone = r.zone||'ambient';
    const zl = zone.charAt(0).toUpperCase()+zone.slice(1);
    const displayDate = r.savedDate || r.savedAt.split(',')[0];
    const cpCeil = Math.ceil(r.calcPeople);
    const cpDisplay = parseFloat(r.calcPeople).toFixed(2);
    const delta = r.delta !== undefined ? r.delta : (r.active > 0 ? r.active - cpCeil : null);
    const info = getDeltaInfo(delta);
    const timeRemH = r.timeRemH !== undefined ? parseFloat(r.timeRemH).toFixed(2) : '—';
    const deltaDisplay = delta !== null ? formatDelta(delta)+' ('+info.label+')' : '—';
    return `<div class="hitem">
      <div class="hhead">
        <div class="hdate">${displayDate} ${r.current||''}<span class="zbadge ${zone}">${zl}</span>${r.note?'<span style="font-size:10px;color:#999;font-style:italic;margin-left:5px;">'+r.note+'</span>':''}</div>
        <button onclick="deleteRecord(${r.id})" style="font-size:10px;color:#999;background:none;border:none;cursor:pointer;white-space:nowrap;margin-left:6px;">delete</button>
      </div>
      <div class="hgrid hgrid-4">
        <div class="hgcol"><div class="hglabel">Rem units</div><div class="hgval">${r.units.toLocaleString()}</div></div>
        <div class="hgcol"><div class="hglabel">OGRP%</div><div class="hgval">${r.ogrp}</div></div>
        <div class="hgcol"><div class="hglabel">UPH</div><div class="hgval">${r.uph}</div></div>
        <div class="hgcol"><div class="hglabel">Time rem</div><div class="hgval">${timeRemH}</div></div>
      </div>
      <div class="hgrid hgrid-3">
        <div class="hgcol"><div class="hglabel">Active</div><div class="hgval">${r.active||'—'}</div></div>
        <div class="hgcol"><div class="hglabel">Calc</div><div class="hgval">${cpDisplay}</div></div>
        <div class="hgcol"><div class="hglabel">Delta</div><div class="hgval delta-${info.cls}">${deltaDisplay}</div></div>
      </div>
      <div class="hgrid hgrid-2">
        <div class="hgcol"><div class="hglabel">Pick out</div><div class="hgval">${r.pickout}</div></div>
        <div class="hgcol"><div class="hglabel">Breaks</div><div class="hgval">${r.breaks}m</div></div>
      </div>
    </div>`;
  }).join('');
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
